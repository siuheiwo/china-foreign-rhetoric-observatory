name: daily-update
  on:
    schedule:
      - cron: "0 8 * * *"
    workflow_dispatch: {}

  permissions: 
    contents: write

  concurrency:
    group: daily-update
    cancel-in-progress: false

  jobs:
    update:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.12"
            cache: pip
        - run: pip install -r pipeline/requirements.txt
        - name: Scrape + score + update scores
          env:
            DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          run: python pipeline/daily_update.py
        - name: Refresh alarms
          run: python build_alarms.py
        - name: Commit & push
          run: |
            git config user.name  "observatory-bot"
            git config user.email "observatory-bot@users.noreply.github.com"
            git add scores_daily.csv scores_weekly.csv scores_monthly.csv alarms.csv
            git commit -m "daily update $(date -u +%F)" || { echo "no changes"; exit 0; }
            git push

